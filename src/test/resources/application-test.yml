spring:
  datasource:
    url: jdbc:h2:mem:churchqt;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

app:
  auth:
    jwt-secret: church-qt-test-secret-key-that-is-long-enough-1234567890
    access-token-expiration-seconds: 3600
  admin-console:
    enabled: true
