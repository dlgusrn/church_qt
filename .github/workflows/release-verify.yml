name: release-verify

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Staging/production backend base URL (e.g. https://api-staging.example.com)"
        required: true
        type: string
      admin_origin:
        description: "Allowed admin frontend origin for CORS preflight"
        required: true
        type: string

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DB_URL: ${{ secrets.DB_URL }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      APP_JWT_SECRET: ${{ secrets.APP_JWT_SECRET }}
      APP_ADMIN_CONSOLE_ENABLED: "false"
      APP_ADMIN_FRONTEND_ALLOWED_ORIGINS: ${{ inputs.admin_origin }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant script/gradle permission
        run: chmod +x ./gradlew ./scripts/release_verify.sh ./scripts/release_preflight.sh ./scripts/staging_smoke.sh

      - name: Run release verify
        run: ./scripts/release_verify.sh "${{ inputs.base_url }}" "${{ inputs.admin_origin }}"
